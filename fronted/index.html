<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Финансовый Трекер</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>💰 Мои Финансы</h1>
            <div id="balance">Баланс: 0 ₽</div>
        </header>
        <form id="transactionForm">
            <input type="number" id="amount" placeholder="Сумма" required step="0.01">
            <select id="type">
                <option value="expense">Расход</option>
                <option value="income">Доход</option>
            </select>
            <select id="category">
                <option value="1">🍔 Продукты</option>
                <option value="2">🚗 Транспорт</option>
                <option value="3">💼 Зарплата</option>
            </select>
            <input type="text" id="comment" placeholder="Комментарий">
            <button type="submit">Добавить</button>
        </form>
        <div id="transactionsList"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
