<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Финансовый Трекер</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <header>
            <h1>💰 Мои Финансы</h1>
            <div id="balance">Баланс: 0 ₽</div>
        </header>

        <div class="filters-section">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Поиск транзакций...">
                <button onclick="searchTransactions()" class="search-btn">Найти</button>
            </div>
            <div class="filter-row">
                <select id="filterType" onchange="applyFilters()">
                    <option value="">Все типы</option>
                    <option value="income">Доходы</option>
                    <option value="expense">Расходы</option>
                </select>
                <select id="filterCategory" onchange="applyFilters()">
                    <option value="">Все категории</option>
                    <option value="1">🍔 Продукты</option>
                    <option value="2">🚗 Транспорт</option>
                    <option value="3">💼 Зарплата</option>
                    <option value="4">🔹 Прочее</option> 
                </select>
                <input type="date" id="filterDateFrom" onchange="applyFilters()">
                <input type="date" id="filterDateTo" onchange="applyFilters()">
            </div>
            <button onclick="clearFilters()" class="clear-filters-btn">🗑️ Сбросить фильтры</button>
        </div>

        <!-- ВКЛАДКИ -->
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('transactions')">Транзакции</button>
            <button class="tab-btn" onclick="showTab('statistics')">Статистика</button>
            <button class="tab-btn charts" onclick="showTab('charts')">📊 Графики</button>
        </div>

        <!-- ВКЛАДКА: ТРАНЗАКЦИИ -->
        <div id="transactionsTab" class="tab-content active">
            <form id="transactionForm">
                <input type="number" id="amount" placeholder="Сумма" required step="0.01">
                <select id="type">
                    <option value="expense">Расход</option>
                    <option value="income">Доход</option>
                </select>
                <select id="category">
                    <option value="1">🍔 Продукты</option>
                    <option value="2">🚗 Транспорт</option>
                    <option value="3">💼 Зарплата</option>
                    <option value="4">🔹 Прочее</option>
                </select>
                <input type="text" id="comment" placeholder="Комментарий">
                <button type="submit">Добавить</button>
            </form>
            <div id="transactionsList"></div>
        </div>

        <!-- ВКЛАДКА: СТАТИСТИКА -->
        <div id="statisticsTab" class="tab-content">
            <button onclick="exportToCSV()" class="export-btn">📥 Экспорт в CSV</button>
            <div class="stats-summary">
                <div class="stat-card income">
                    <div class="stat-label">💵 Доходы</div>
                    <div class="stat-value" id="totalIncome">0 ₽</div>
                </div>
                <div class="stat-card expense">
                    <div class="stat-label">💸 Расходы</div>
                    <div class="stat-value" id="totalExpense">0 ₽</div>
                </div>
            </div>
            <h3>Расходы по категориям</h3>
            <div id="categoryStats"></div>
        </div>

        <!-- ВКЛАДКА: ГРАФИКИ -->
        <div id="chartsTab" class="tab-content">
            <h3>📈 Визуализация расходов</h3>
            <div class="chart-container">
                <canvas id="expenseChart"></canvas>
            </div>
            <h3>📅 Месячная статистика</h3>
            <div class="chart-container">
                <canvas id="monthlyChart"></canvas>
            </div>
        </div>
    </div>

    
    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeEditModal()">&times;</span>
            <h2>Редактировать транзакцию</h2>
            <form id="editTransactionForm">
                <input type="hidden" id="editTransactionId">
                <input type="number" id="editAmount" placeholder="Сумма" required step="0.01">
                <select id="editType">
                    <option value="expense">Расход</option>
                    <option value="income">Доход</option>
                </select>
                <select id="editCategory">
                    <option value="1">🍔 Продукты</option>
                    <option value="2">🚗 Транспорт</option>
                    <option value="3">💼 Зарплата</option>
                    <option value="4">🔹 Прочее</option> 
                </select>
                <input type="text" id="editComment" placeholder="Комментарий">
                <button type="submit">💾 Сохранить</button>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
